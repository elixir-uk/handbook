title: ELIXIR-UK Handbook
topnav_title: ELIXIR-UK Handbook
description: "The ELIXIR-UK Handbook – brand, voice, communications strategy, and community participation model. Built to be read by humans and by language models."

remote_theme: ELIXIR-Belgium/elixir-toolkit-theme@6.0.0

# Local dev server defaults (override with --port / --host on the CLI)
port: 4001
host: 127.0.0.1

sass:
  style: compressed
  sourcemap: never

theme_variables:
  topnav:
    # brand_logo intentionally omitted – using text title instead of a logo image
    theme: dark
  back_to_top: true
  fonts:
    - https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap

topnav_banner: "An evolving reference. New sections are being added through 2026."

exclude:
  - README.md
  - vendor
  - Gemfile

defaults:
  -
    scope:
      path: ""
      type: "pages"
    values:
      permalink: /:basename
      layout: "page"
      search_exclude: false
  -
    scope:
      path: "pages/brand"
    values:
      sidebar: brand
      type: brand
  -
    scope:
      path: "pages/style-guide"
    values:
      sidebar: style-guide
      type: style_guide
  -
    scope:
      path: "pages/communications-strategy"
    values:
      sidebar: communications-strategy
      type: communications_strategy
  -
    scope:
      path: "pages/community-participation-model"
    values:
      sidebar: community-participation-model
      type: community_participation_model

plugins:
  - elixir-toolkit-theme-plugins
  - jekyll-redirect-from
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-github-metadata
  - jemoji
  - webrick

github:
  repository_url: https://github.com/elixir-uk/style-guide
  source:
    branch: main
