# Central registry of tools, templates, downloads and external resources
# for the ELIXIR-UK Handbook.
#
# Schema:
#   id          – unique slug
#   name        – display name
#   url         – link to the resource (use "#" if a placeholder)
#   description – one-line description
#   type        – what kind of resource: logo / template / font / image-asset /
#                 external-link / internal-link
#   section     – list of site sections this resource belongs to.
#                 Values: brand / style-guide / communications-strategy /
#                 community-participation-model
#                 A resource can belong to more than one section.
#
# Page usage:
#   In a page's frontmatter, list the resources to display at the bottom:
#       resources: [logotype, isometric-illustrations]
#
# Section-level rollup (e.g. for an "all resources" page):
#       {% include section-resources.html section="brand" %}
#   This pulls every resource where `section` contains "brand".


# --- Logos --------------------------------------------------------------
- id: logo-bundle
  name: ELIXIR-UK logo bundle
  url: /assets/downloads/elixir-uk-logos.zip
  description: All four ELIXIR-UK lockups (logotype, logomark, expanded, sponsored) with their light- and dark-background variants in SVG and PNG. See [Logo variations](/logo-variations) for previews and individual downloads.
  type: logo
  section: [brand]


