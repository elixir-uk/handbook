# Central registry of tools, templates, and external resources for the
# ELIXIR-UK Handbook. Pattern borrowed from
# github.com/elixir-europe/ds-handbook.
#
# Reference an entry from a page's frontmatter by its `id`:
#
#     resources: [main-logo-horizontal, elixir-hub, elitma]
#
# Categories
#   template          – downloadable artefact you'd reuse (logo, slides, doc template)
#   internal_resource – another page or asset inside this site
#   external_resource – anything hosted outside this site


# --- Logos --------------------------------------------------------------
- id: main-logo-horizontal
  name: ELIXIR-UK logo — horizontal lockup
  url: /assets/img/logos/main-logo-horizontal.svg
  description: Primary horizontal logo lockup. SVG. (Currently using the parent ELIXIR mark — to be replaced with ELIXIR-UK-specific lockup once recovered/reconstructed.)
  category: template

- id: main-logo-mark
  name: ELIXIR-UK logo — main mark
  url: /assets/img/logos/main_logo.svg
  description: Square logo mark. SVG. Use when the wordmark would be too long for the available space.
  category: template

- id: logo-sponsored
  name: ELIXIR-UK logo — sponsored variant
  url: "#"
  description: For events or sponsorship occasions. _To be added._
  category: template

- id: logo-expanded
  name: ELIXIR-UK logo — expanded variant
  url: "#"
  description: For occasions where the logotype needs horizontal alignment and the logomark alone isn't enough. _To be added._
  category: template


