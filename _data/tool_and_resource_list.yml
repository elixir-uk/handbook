# --- Strategy & toolkit references --------------------------------------
- id: elixir-comms-strategy
  name: ELIXIR (parent) Communications Strategy v2.1
  url: https://docs.google.com/document/d/1u-EXCOT-F-01LDpBdF2D8u8rg6B0djoMAxjVqvLmnbk/edit
  description: Hub-level comms strategy (Jan 2026, Elaine Harrison). Five objectives, four stakeholder groups, Hub channels, crisis plan. ELIXIR-UK localises against this.
  type: external-link
  section: [communications-strategy]

- id: elixir-style-guide
  name: ELIXIR (parent) Style Guide
  url: https://docs.google.com/document/d/1rBOwpgYUGunsjgrVnCAkmOy9K0jGBLrG/edit
  description: Hub-level style guide (Sept 2025, Deborah van Wyk). Capitalisation, dates, ELIXIR-specific terms, spelling. ELIXIR-UK follows it with named exceptions (the ELIXIR-UK hyphen, double quotation marks).
  type: external-link
  section: [brand, style-guide]

- id: elixir-brand-guidelines
  name: ELIXIR (parent) Brand Guidelines
  url: https://elixir-europe.org/sites/default/files/documents/elixir-brand-guidelines-2025.pdf
  description: Parent ELIXIR brand book – palette, logo, type. ELIXIR-UK inherits from this.
  type: external-link
  section: [brand]

- id: steers-comms-toolkit
  name: ELIXIR Node Communications Strategy Toolkit
  url: https://docs.google.com/document/d/1g5e2XcW9CzytDa7lL5nXGumeRBxvqg5hphlwqzGwsaU/edit
  description: ELIXIR-STEERS M5.3 (Nov 2025) – canonical template for Node communications strategies.
  type: external-link
  section: [communications-strategy]

- id: tess
  name: TeSS
  url: https://tess.elixir-europe.org/
  description: ELIXIR training portal. UK events are added here and an RSS feed pulls the latest into the ELIXIR-UK newsletter. Full automation pending.
  type: external-link
  section: [communications-strategy]

- id: elixir-hub-vacancies
  name: ELIXIR Hub vacancies page
  url: https://elixir-europe.org/about-us/vacancies
  description: Hub-hosted job board. UK members post UK vacancies here; an RSS feed pulls them into the ELIXIR-UK newsletter, which Zapier then posts to Slack and LinkedIn.
  type: external-link
  section: [communications-strategy]

- id: elixir-code-of-conduct
  name: ELIXIR Code of Conduct
  url: https://elixir-europe.org/events/code-of-conduct
  description: Hub-published Code of Conduct. Applies only to events organised by the Hub – not a Node-wide policy.
  type: external-link
  section: [communications-strategy]

- id: f1000-elixir-gateway
  name: ELIXIR Gateway on F1000Research
  url: https://f1000research.com/elixir
  description: Open-access publishing venue for ELIXIR-funded research. APCs are covered by ELIXIR for accepted articles.
  type: external-link
  section: [communications-strategy]

- id: zenodo-elixir
  name: ELIXIR (Europe) Zenodo community
  url: https://zenodo.org/communities/elixir
  description: Europe-level Zenodo community for ELIXIR outputs. Use for DOIs on anything that isn't a peer-reviewed article. Entries can be associated with more than one community.
  type: external-link
  section: [communications-strategy]

- id: zenodo-elixir-uk
  name: ELIXIR-UK Zenodo community
  url: https://zenodo.org/communities/elixir-uk
  description: UK Zenodo community for ELIXIR-UK outputs. Use for DOIs on anything that isn't a peer-reviewed article. Entries can be associated with more than one community (e.g. both the UK and Europe communities).
  type: external-link
  section: [communications-strategy]
